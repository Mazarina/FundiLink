name: CI

on:
  push:
    branches: [main, develop, "claude/**", "production/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__Default: "Host=localhost;Database=test;Username=test;Password=test"
          JwtSettings__SecretKey: ${{ secrets.CI_JWT_SECRET_KEY || 'ci-test-secret-key-minimum-32-chars-long' }}
          JwtSettings__Issuer: "FundiLink"
          JwtSettings__Audience: "FundiLink"
          JwtSettings__ExpiryMinutes: "60"

  frontend:
    name: Build and Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/fundilink-web/package-lock.json

      - name: Install dependencies
        working-directory: src/fundilink-web
        run: npm ci

      - name: Build
        working-directory: src/fundilink-web
        run: npm run build

      - name: Test
        working-directory: src/fundilink-web
        run: npm test
