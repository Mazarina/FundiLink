# Host Nginx reverse-proxy config for the FundiLink API.
# Place at /etc/nginx/sites-available/fundilink-api.conf and symlink into
# /etc/nginx/sites-enabled/, then issue a certificate with Certbot:
#   certbot --nginx -d api-fundilink.zultek.co.za
#
# Certbot will rewrite the server block below to add the SSL certificate
# directives and an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api-fundilink.zultek.co.za;

    # Allow document uploads up to the FundiLink MVP limit (10MB) plus
    # multipart/form-data overhead.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Document uploads/downloads can take longer than the default timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
