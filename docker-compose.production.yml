# Production deployment for FundiLink by ZulTek.
#
# Run from /opt/fundilink/app on the VPS, with the env file at
# /opt/fundilink/env/fundilink.env (see .env.production.example for required keys).
#
# Networking:
#   - fundilink-db is NOT published to the host (internal network only).
#   - fundilink-api  -> 127.0.0.1:5100  (host-level Nginx proxies HTTPS)
#   - fundilink-web  -> 127.0.0.1:3100  (host-level Nginx proxies HTTPS)

services:
  fundilink-db:
    image: postgres:16-alpine
    container_name: fundilink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - fundilink-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fundilink-internal

  fundilink-api:
    build:
      context: .
      dockerfile: src/FundiLink.Api/Dockerfile
    image: fundilink-api:latest
    container_name: fundilink-api
    restart: unless-stopped
    depends_on:
      fundilink-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=fundilink-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JwtSettings__SecretKey: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS}
      DocumentStorage__RootPath: /app/uploads
      DocumentStorage__MaxSizeBytes: ${DOCUMENT_MAX_SIZE_BYTES:-10485760}
      RateLimiting__PermitLimit: ${RATE_LIMIT_PERMIT_LIMIT:-100}
      RateLimiting__WindowSeconds: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - /opt/fundilink/storage/documents:/app/uploads
    ports:
      - "127.0.0.1:5100:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - fundilink-internal
      - fundilink-public

  fundilink-web:
    build:
      context: ./src/fundilink-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: fundilink-frontend:latest
    container_name: fundilink-web
    restart: unless-stopped
    depends_on:
      - fundilink-api
    ports:
      - "127.0.0.1:3100:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - fundilink-public

networks:
  fundilink-internal:
    internal: true
  fundilink-public:

volumes:
  fundilink-pgdata:
