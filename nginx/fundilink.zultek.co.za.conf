# Nginx host-level reverse proxy for FundiLink by ZulTek.
#
# Deploy:
#   sudo cp nginx/fundilink.zultek.co.za.conf /etc/nginx/sites-available/fundilink.zultek.co.za.conf
#   sudo ln -sf /etc/nginx/sites-available/fundilink.zultek.co.za.conf \
#               /etc/nginx/sites-enabled/fundilink.zultek.co.za.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue TLS certificates:
#   sudo certbot --nginx -d fundilink.zultek.co.za -d api.fundilink.zultek.co.za
#
# Certbot will inject the ssl_certificate directives and HTTP→HTTPS redirects.

# ── FundiLink Frontend ────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name fundilink.zultek.co.za;

    # Certbot will rewrite this block to redirect HTTP → HTTPS.
    # After certbot, the HTTPS server block below handles all traffic.

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fundilink.zultek.co.za;

    # TLS — managed by Certbot; do not edit these paths manually.
    # ssl_certificate     /etc/letsencrypt/live/fundilink.zultek.co.za/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fundilink.zultek.co.za/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── FundiLink API ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.fundilink.zultek.co.za;

    location / {
        proxy_pass http://127.0.0.1:5100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.fundilink.zultek.co.za;

    # TLS — managed by Certbot; do not edit these paths manually.
    # ssl_certificate     /etc/letsencrypt/live/fundilink.zultek.co.za/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fundilink.zultek.co.za/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;

    # Support document uploads up to the FundiLink MVP limit plus multipart overhead.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
