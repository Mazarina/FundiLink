# Host Nginx reverse-proxy config for the FundiLink frontend.
# Place at /etc/nginx/sites-available/fundilink-frontend.conf and symlink into
# /etc/nginx/sites-enabled/, then issue a certificate with Certbot:
#   certbot --nginx -d fundilink.zultek.co.za
#
# Certbot will rewrite the server block below to add the SSL certificate
# directives and an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name fundilink.zultek.co.za;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
